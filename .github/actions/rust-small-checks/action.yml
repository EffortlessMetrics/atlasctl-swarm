name: Rust small checks
description: Run bounded Rust checks when a Rust workspace exists.
inputs:
  mode:
    description: "Check depth: full runs cargo check and cargo test; check runs the compile check only."
    required: false
    default: full
runs:
  using: composite
  steps:
    - name: Detect Rust workspace
      id: detect
      shell: bash
      run: |
        set -euo pipefail
        if [ -f Cargo.toml ]; then
          echo "has_rust=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_rust=false" >> "$GITHUB_OUTPUT"
          echo "No Cargo.toml found; treating atlasctl-swarm as control-plane-only for this check."
        fi

    - name: Show Rust versions
      if: steps.detect.outputs.has_rust == 'true'
      shell: bash
      run: |
        rustc --version
        cargo --version

    - name: cargo check
      if: steps.detect.outputs.has_rust == 'true'
      shell: bash
      run: cargo check --workspace --locked

    - name: cargo test
      if: steps.detect.outputs.has_rust == 'true' && inputs.mode == 'full'
      shell: bash
      run: cargo test --workspace --locked
