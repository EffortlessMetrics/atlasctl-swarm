name: Droid PR Review

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

concurrency:
  group: droid-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  droid-review:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' &&
       (github.event.label.name == 'ai-review' || github.event.label.name == 'full-ci'))
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MiniMax M3 for Droid BYOK
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          mkdir -p "$HOME/.factory"

          jq -n --arg key "$MINIMAX_API_KEY" '{
            customModels: [
              {
                model: "MiniMax-M3",
                displayName: "MiniMax-M3",
                baseUrl: "https://api.minimax.io/anthropic",
                apiKey: $key,
                provider: "anthropic",
                maxOutputTokens: 64000
              }
            ]
          }' > "$HOME/.factory/settings.json"

      - name: Run Droid Auto Review
        # TODO: pin to a release SHA once one is vetted (mutable @main is a supply-chain risk)
        uses: Factory-AI/droid-action@main
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.FACTORY_API_KEY }}
          automatic_review: true
          review_model: custom:MiniMax-M3-0
          automatic_security_review: true
          security_model: custom:MiniMax-M3-0
