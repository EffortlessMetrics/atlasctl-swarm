schema_version = "1.0"

[project]
repo = "atlasctl-swarm"
framework = "rails"
root = ".rails"

[conventions]
proposal_prefix = "ATLAS-PROP"
spec_prefix = "ATLAS-SPEC"
adr_prefix = "ATLAS-ADR"
lane_prefix = "ATLAS-LANE"

[external_namespaces]
codex = ".codex"
speckit = ".spec"
claude = ".claude"
jules = ".jules"

[[artifact]]
id = "ATLAS-PROP-0001"
kind = "proposal"
path = ".rails/proposals/ATLAS-PROP-0001-rails-knowledge-base.md"
status = "accepted"
owner = "rails-adoption"

[[artifact]]
id = "ATLAS-SPEC-0001"
kind = "spec"
path = ".rails/specs/ATLAS-SPEC-0001-rails-artifact-graph.md"
status = "accepted"
owner = "rails-adoption"
linked_proposal = "ATLAS-PROP-0001"

[[artifact]]
id = "ATLAS-ADR-0001"
kind = "adr"
path = ".rails/adr/ATLAS-ADR-0001-rails-framework-footprint.md"
status = "accepted"
owner = "rails-adoption"
linked_specs = ["ATLAS-SPEC-0001"]

[[lane]]
id = "rails-adoption"
name = "Rails adoption"
path = ".rails/lanes/rails-adoption/tracker.toml"
status = "active"
owner = "core"
